<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet"
href="css/profile.css">

</head>

<body>

<div class="container">

<div class="profile-card">

<img
src="images/profile.png"
alt="Profile"
class="profile-pic">

<h2>Anjlee Rana</h2>

<p>AI Plant Disease User</p>

</div>

<div class="info-card">

<h3>📧 Email</h3>

<p>anjlee@example.com</p>

</div>

<div class="info-card">

<h3>📱 Phone</h3>

<p>9876543210</p>

</div>

<div class="info-card">

<h3>🌐 Preferred Language</h3>

<select id="language">

<option>English</option>

<option>Hindi</option>

<option>Kannada</option>

<option>Tamil</option>

<option>Telugu</option>

</select>

</div>

<div class="info-card">

<h3>🔔 Notifications</h3>

<label class="switch">

<input
type="checkbox"
checked>

<span class="slider"></span>

</label>

</div>

<button
class="save-btn"
onclick="saveProfile()">

💾 Save Changes

</button>

<button
class="logout-btn"
onclick="logout()">

🚪 Logout

</button>

</div>

<button
class="save-btn"
onclick="goSettings()">

⚙ Settings

</button>
<script src="js/profile.js"></script>

</body>

</html>
