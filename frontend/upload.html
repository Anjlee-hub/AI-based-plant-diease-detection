<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Upload Leaf Image</title>

<link rel="stylesheet"
href="css/upload.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="container">

<h2>🌱 Upload Plant Image</h2>

<p>Select a leaf image for disease detection</p>

<div class="upload-box">

<img id="preview"
src="images/healthy.png"
alt="Preview">

<input type="file"
id="fileInput"
accept="image/*"
hidden>

<button onclick="selectImage()">

<i class="fa-solid fa-image"></i>

Choose Image

</button>

</div>

<div class="buttons">

<button class="detect-btn"
onclick="detectDisease()">

🔍 Detect Disease

</button>

</div>

</div>

<script src="js/upload.js"></script>

</body>
</html>
