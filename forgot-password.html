<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet"
href="css/forgot-password.css">

</head>

<body>

<div class="container">

<div class="card">

<h2>🔐 Forgot Password</h2>

<p>Reset your account password</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<button
onclick="sendOTP()">

Send OTP

</button>

<input
type="text"
id="otp"
placeholder="Enter OTP">

<input
type="password"
id="newPassword"
placeholder="New Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button
onclick="resetPassword()">

Reset Password

</button>

<a href="login.html">

Back To Login

</a>

</div>

</div>

<script src="js/forgot-password.js"></script>

</body>

</html>
