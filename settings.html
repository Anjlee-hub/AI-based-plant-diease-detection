<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet"
href="css/settings.css">

</head>

<body>

<div class="container">

<h2>⚙ Settings</h2>

<p>Customize your app experience</p>

<div class="setting-card">

<h3>🌐 App Language</h3>

<select id="appLanguage">

<option>English</option>

<option>Hindi</option>

<option>Kannada</option>

<option>Tamil</option>

<option>Telugu</option>

</select>

</div>

<div class="setting-card">

<h3>🎤 Voice Output Language</h3>

<select id="voiceLanguage">

<option>English</option>

<option>Hindi</option>

<option>Kannada</option>

<option>Tamil</option>

<option>Telugu</option>

</select>

</div>

<div class="setting-card">

<h3>🔔 Notifications</h3>

<label class="switch">

<input type="checkbox" checked>

<span class="slider"></span>

</label>

</div>

<div class="setting-card">

<h3>🌙 Dark Mode</h3>

<label class="switch">

<input type="checkbox">

<span class="slider"></span>

</label>

</div>

<div class="setting-card">

<h3>📱 App Version</h3>

<p>AI Plant Disease Detector v1.0</p>

</div>

<button
class="save-btn"
onclick="saveSettings()">

💾 Save Settings

</button>

</div>

<script src="js/settings.js"></script>

</body>

</html>
